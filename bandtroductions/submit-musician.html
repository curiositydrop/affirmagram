<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit as Musician | BANDtroductions</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>BANDtroductions</h1>
<p>Submit as a Musician</p>

<nav>
<a href="index.html">Home</a>
<a href="bands.html">Browse Bands</a>
<a href="musicians.html">Browse Musicians</a>
<a href="submit-band.html">Submit Your Band</a>
<a href="submit-musician.html">Submit as Musician</a>
</nav>
</header>

<section class="form-page">

<h2>Get Featured as a Musician</h2>
<p>
Send in your info and performance video to be featured on BANDtroductions.
</p>

<form class="submission-form">

<label for="name">Name / Stage Name</label>
<input type="text" id="name" name="name">

<label for="instrument">Instrument</label>
<input type="text" id="instrument" name="instrument">

<label for="location">Location</label>
<input type="text" id="location" name="location">

<label for="genre">Style / Genre</label>
<input type="text" id="genre" name="genre">

<label for="influences">Influences</label>
<input type="text" id="influences" name="influences">

<label for="availability">Availability</label>
<input type="text" id="availability" name="availability">

<label for="video">Performance Video Link</label>
<input type="url" id="video" name="video">

<label for="bio">Short Bio</label>
<textarea id="bio" name="bio" rows="6"></textarea>

<label for="contact">Contact Email or Social Link</label>
<input type="text" id="contact" name="contact">

<button type="submit">Submit Profile</button>

</form>

</section>

<footer>
<p>© BANDtroductions</p>
</footer>

</body>
</html>
