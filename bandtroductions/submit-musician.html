<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANDtroductions</title>

</head>

<body>

<header>

<div class="logo-area">
<img src="IMG_9367.png" alt="BANDtroductions Logo">
<p class="tagline">Show the music. Find your band.</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="bands.html">Browse Bands</a>
<a href="musicians.html">Browse Musicians</a>
<a href="submit-band.html">Submit Your Band</a>
<a href="submit-musician.html">Submit as Musician</a>
<a href="sponsors.html">Sponsors</a>
<a href="about.html">About</a>
</nav>

</header>

<section class="form-page">

<h2>Get Featured as a Musician</h2>
<p>
Send in your info and performance video to be featured on BANDtroductions.
</p>

<form
name="musician-submission"
method="POST"
data-netlify="true"
netlify
netlify-honeypot="bot-field"
action="/bandtroductions/thank-you.html"
class="submission-form"
enctype="multipart/form-data"
>

<input type="hidden" name="form-name" value="musician-submission">
<input type="hidden" name="subject" value="New BANDtroductions Musician Submission">

<p style="display:none;">
<label>Don't fill this out if you're human: <input name="bot-field"></label>
</p>

<label for="name">Name / Stage Name *</label>
<input type="text" id="name" name="name" required>

<label for="instrument">Instrument *</label>
<input type="text" id="instrument" name="instrument" required>

<label for="location">Location</label>
<input type="text" id="location" name="location">

<label for="genre">Style / Genre</label>
<input type="text" id="genre" name="genre">

<label for="influences">Influences</label>
<input type="text" id="influences" name="influences">

<label for="availability">Availability</label>
<input type="text" id="availability" name="availability">

<label for="video">Performance Video Link</label>
<input type="url" id="video" name="video">

<label for="photo">Profile Photo</label>
<input type="file" id="photo" name="photo">

<label for="bio">Short Bio</label>
<textarea id="bio" name="bio" rows="6"></textarea>

<label for="contact">Contact Email or Social Link *</label>
<input type="text" id="contact" name="contact" required>

<button type="submit">Submit Profile</button>

</form>

</section>

<footer>
<p>© BANDtroductions</p>
</footer>

</body>
</html>
